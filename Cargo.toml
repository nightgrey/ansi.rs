[workspace]
resolver = "3"
members = [
    "crates/ansi", "crates/geometry", "crates/grid",
    "crates/sigil", "crates/tagged", "crates/tagged-derive", "crates/terminal", "crates/tree", "crates/utils",
]

[workspace.dependencies]
smallvec = {version = "2.0.0-alpha.12" }
rustix = { version = "1.1.2", features = ["termios"] }
smol = "2.0.2"
derive_more = { version = "2.0.1", features = ["full"] }
unicode-segmentation = "1.12.0"
unicode-width = "0.2.2"
bitflags = "2.10.0"
bytemuck = "1.24.0"
textwrap = "0.16.2"
ansi = { path = "crates/ansi" }
utils = { path = "crates/utils" }
geometry = { path = "crates/geometry" }
terminal = { path = "crates/terminal" }
grid = { path = "crates/grid" }
tree = { path = "crates/tree" }
tagged = { path = "crates/tagged"}
tagged-derive = { path = "crates/tagged-derive" }
bitcraft = { version = "0.9.2" }

[profile.bench]
debug = true
